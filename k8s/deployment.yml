apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  labels:
    app: flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask-container
        image: yassinebrahimi/lms-flask-app:latest # Should be updated by CI/CD
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
