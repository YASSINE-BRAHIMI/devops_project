---
- name: Installer et configurer le Worker K3s
  hosts: worker
  become: yes
  tasks:
    - name: Lire le token généré par le Master
      set_fact:
        k3s_token: "{{ lookup('file', './k3s_token.txt') }}"

    - name: Lire l'IP du Master
      set_fact:
        k3s_master_ip: "{{ groups['master'][0] }}"

    - name: Télécharger et installer K3s (Worker)
      shell: curl -sfL https://get.k3s.io | K3S_URL=https://{{ k3s_master_ip }}:6443 K3S_TOKEN={{ k3s_token }} sh -
      args:
        creates: /usr/local/bin/k3s-agent

    - name: Vérifier que le service k3s-agent est lancé
      systemd:
        name: k3s-agent
        state: started
        enabled: yes
