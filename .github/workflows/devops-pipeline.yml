name: DevOps Project CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Flask App
      uses: docker/build-push-action@v4
      with:
        context: ./app
        push: true
        tags: yassinebrahimi/lms-flask-app:latest

  deploy-to-k3s:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    # Note: KUBECONFIG secret must be set in GitHub repository settings
    - name: Deploy to K3s cluster
      env:
        KUBECONFIG: ${{ secrets.KUBECONFIG }}
      run: |
        echo "$KUBECONFIG" > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml
        kubectl apply -f k8s/deployment.yml --insecure-skip-tls-verify --validate=false
        kubectl apply -f k8s/service.yml --insecure-skip-tls-verify --validate=false
        kubectl rollout restart deployment/flask-app --insecure-skip-tls-verify
